name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Prepare Pi workspace dependency
        run: |
          PI_REPO_REF="${PI_REPO_REF:-v0.80.3}"
          git clone --filter=blob:none https://github.com/earendil-works/pi.git ../pi
          git -C ../pi checkout "$PI_REPO_REF"
          npm --prefix ../pi ci --ignore-scripts
          npm --prefix ../pi/packages/tui run build
          npm --prefix ../pi/packages/ai run build
          npm --prefix ../pi/packages/agent run build
          npm --prefix ../pi/packages/coding-agent run build
      - name: Install dependencies
        run: npm ci
      - name: Lint, build, and test
        run: npm test
